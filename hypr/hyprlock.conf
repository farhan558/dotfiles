background {
    monitor =
    path = /home/farhan/Pictures/wallpapers/1.png   # only png supported for now
    color = rgba(25, 20, 20, 1.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 3 # 0 disables blurring
    blur_size = 6
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
  text = cmd[update:1000] echo "<span foreground='##ffffff' font_weight='900'>$TIME</span>"
  font_family = Space Grotesk
  font_size = 70
    position = 0, 30
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi there, $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 15
    font_family = Space Grotesk

    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 40
    outline_thickness = 0
    dots_size = 0.23 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.30 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(111111)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <span foreground='##a0a0a0' font_family="Space Grotesk" font_weight="600">Enter Password</span> .
    hide_input = false
    rounding = 10 # -1 means complete rounding (circle/oval)
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off


    position = 0, -20
    halign = center
    valign = center
}
